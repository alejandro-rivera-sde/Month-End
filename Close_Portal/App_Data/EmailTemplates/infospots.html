<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0; padding:0; background-color:#f1f5f9; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f1f5f9; padding:40px 0;">
  <tr><td align="center">
    <table width="600" cellpadding="0" cellspacing="0" style="background-color:#ffffff; border-radius:8px; overflow:hidden; box-shadow:0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);">

      <!-- Cabecera coloreada -->
      <tr><td style="background:{{COLOR}}; padding:32px;">
        <p style="margin:0 0 4px 0; color:rgba(255,255,255,0.8); font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:1.5px;">
          Close Portal &mdash; Novamex
        </p>
        <h1 style="margin:0; color:#ffffff; font-size:24px; font-weight:600; letter-spacing:-0.5px;">
          {{TITLE}}
        </h1>
      </td></tr>

      <!-- Párrafo introductorio + filas de info + tabla de spots opcional -->
      <tr><td style="padding:28px 32px;">
        <p style="margin:0 0 8px; font-size:15px; color:#334155; line-height:1.5;">{{INTRO}}</p>
        <table width="100%" cellpadding="0" cellspacing="0">{{INFO_ROWS}}</table>
        {{SPOTS_SECTION}}
      </td></tr>

      <!-- Pie -->
      <tr><td style="padding:24px 32px; background-color:#f8fafc; border-top:1px solid #e2e8f0; text-align:center;">
        <p style="margin:0; color:#64748b; font-size:12px; line-height:1.5;">
          {{FOOTER_TEXT}}<br>
          {{FOOTER_NOREPLY}}
        </p>
      </td></tr>

    </table>
  </td></tr>
</table>
</body>
</html>
